<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas - LocalSmart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="header-app">
        <section class="header-top">
        <button class="btn-header" onclick ="ir('dashboard.html')">Volver ⬅</button>
        <h2 class="titulo-header">Tareas</h2> 
        <button class="btn-header salir" onclick="cerrarSesion()">Cerrar sesión ⏻</button>
        </section>
    </header>
    <!--Formulario para que el jefe asigne tareas-->
    <main class="contenedor">
        <section class="card">
            <h3>Nueva tarea</h3>
            <form id="form-tarea" class="formulario">
                <input type="text" id="titulo" placeholder="Título" required>
                <input type="text" id="descripcion" placeholder="Descripción" required>
                <input type="date" id="fecha" required>
                <label>Asignar usuario(os):</label>
                <!--Se puede asignar una misma tarea a más de un usuario-->
                <select id="usuarios" multiple required></select>
                <button type="submit">Crear tarea</button>
            </form>
        </section>
        <!--En esta sección se renderizan las tareas activas por medio de JS-->
        <section class="card">
            <h3>Listado de Tareas</h3>
            <section id="lista-tareas"></section>
        </section>
    </main>
    <nav class="menu">
    <button onclick="ir('dashboard.html')"><h3>Dashboard🏠</h3></button>
    <button onclick="ir('productos.html')"><h3>Productos📦</h3></button>
    <button onclick="ir('tareas.html')"><h3>Tareas📝</h3></button>
    <button onclick="ir('incentivos.html')"><h3>Incentivos🎁</h3></button>
    <button id="btn-usuarios" onclick="ir('usuarios.html')"><h3>Usuarios👤</h3></button>
    <button id="btn-reportes" onclick="ir('reportes.html')"><h3>Reportes📊</h3></button>
</nav>

    <script src="app.js"></script>
    <script src="tareas.js"></script>
</body>
</html>
