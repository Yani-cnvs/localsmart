<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incentivos - LocalSmart</title>
    <link rel="stylesheet" href="style.css">
    <!--manifest para que el navegador la reconozca como PWA-->
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="header-app">
        <section class="header-top">
        <button class="btn-header" onclick ="ir('dashboard.html')">Volver ⬅</button>
        <h2 class="titulo-header">Incentivos y Beneficios</h2> 
        <button class="btn-header salir" onclick="cerrarSesion()">Cerrar sesión ⏻</button>
        </section>
    </header>
    <main class="contenedor">
        <section id="seccion-puntos" class="card puntos-card">
            <h3>Mis puntos</h3>
            <p id="puntos" class="puntos-numero">0 puntos</p>
            <span class="puntos-texto">puntos acumulados</span>
        </section>
<!--Aquí se cargan los beneficios gracias al fetch-->
        <section>
            <h2>Beneficios Disponibles</h2>
            <section id="lista-incentivos"></section>
        </section>

        <section id="seccion-solicitud">
            <h3>Solicitar canje de beneficio</h3>
            <form id="form-incentivo">
                <input type="text" id="nombre-beneficio" placeholder="Nombre de beneficio" required>
                <button type="submit">Solicitar</button>
                </form>
                </section>
<!--CRUD visible solo para el jefe, se debería ocultar al ingresar como vendedor-->
            <section id="seccion-crud">
                <h3>Gestión de Incentivos</h3>
                <form id="form-crud">
                    <input type="hidden" id="id-incentivo">
                    <input type="text" id="crud-nombre" placeholder="Nombre" required>
                    <input type="text" id="crud-descripcion" placeholder="Descripción" required>
                    <input type="number" id="crud-puntos" placeholder="Puntos" required> 

                    <button type="submit">Guardar</button>
                </form>
                <!--Listado par aadministrar y modificiar los beneficios-->
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Puntos</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id= "tabla-crud"></tbody>
                </table>
        </section>
    </main>
<nav class="menu">
    <button onclick="ir('dashboard.html')"><hspan class="menu-icono">🏠</span><span class="menu-texto">Dashboard</span></button>
    <button onclick="ir('productos.html')"><hspan class="menu-icono">📦</span><span class="menu-texto">Productos</span></button>
    <button onclick="ir('tareas.html')"><hspan class="menu-icono">📝</span><span class="menu-texto">Tareas</span></button>
    <button onclick="ir('incentivos.html')"><hspan class="menu-icono">🎁</span><span class="menu-texto">Incentivos</span></button>
    <!--estoos botones del menú son solo accesibles para los jefes-->
    <button id="btn-usuarios" onclick="ir('usuarios.html')"><span class="menu-icono">👤</span><span class="menu-texto">Usuarios</span></button>
    <button id="btn-reportes" onclick="ir('reportes.html')"><span class="menu-icono">📊</span><span class="menu-texto">Reportes</span></button>
</nav>
<!--app.js para funciones globales e incentivos.js para lógica específica.-->
    <script src="app.js"></script>
    <script src="incentivos.js"></script>
</body>
</html>
