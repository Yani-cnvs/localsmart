<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - LocalSmart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="header-app">
        <section class="header-top">
        <button class="btn-header" onclick ="ir('dashboard.html')">Volver ⬅</button>
        <h2 class="titulo-header">Usuarios</h2> 
        <button class="btn-header salir" onclick="cerrarSesion()">Cerrar sesión ⏻</button>
        </section>
    </header>
    <main>
        <section class="card">
            <!--Formulario para registrar a los nuevos trabajadores-->
            <h3>Agregar nuevo usuario</h3>
            <form id="form-usuario">
                <input type="text" id="nombre" placeholder="Nombre" required>
                <input type="email" id="correo" placeholder="Correo" required>
                <input type="password" id="contrasena" placeholder="Contraseña" required>
                <select id="rol" required>
                    <!--De acuerdo al rol serán los permisos que tenga el usuario-->
                    <option value="">Seleccionar rol</option>
                    <option value="jefe">Jefe</option>
                    <option value="vendedor">Vendedor</option>
                </select>
                <button type="submit">Guardar usuario</button>
            </form>
        </section>
        <section>
            <!--Contenedor dinámico para listar todos los trabajadores-->
            <h3>Listado de usuarios</h3>
            <section id="lista-usuarios"></section>
        </section>
    </main>
<nav class="menu">
    <button onclick="ir('dashboard.html')"><hspan class="menu-icono">🏠</span><span class="menu-texto">Dashboard</span></button>
    <button onclick="ir('productos.html')"><hspan class="menu-icono">📦</span><span class="menu-texto">Productos</span></button>
    <button onclick="ir('tareas.html')"><hspan class="menu-icono">📝</span><span class="menu-texto">Tareas</span></button>
    <button onclick="ir('incentivos.html')"><hspan class="menu-icono">🎁</span><span class="menu-texto">Incentivos</span></button>
    <!--estoos botones del menú son solo accesibles para los jefes-->
    <button id="btn-usuarios" onclick="ir('usuarios.html')"><span class="menu-icono">👤</span><span class="menu-texto">Usuarios</span></button>
    <button id="btn-reportes" onclick="ir('reportes.html')"><span class="menu-icono">📊</span><span class="menu-texto">Reportes</span></button>
</nav>

    <script src="app.js"></script>
    <script src="usuarios.js"></script>
</body>
</html>
