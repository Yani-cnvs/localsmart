<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h2>Productos</h2>
        <button onclick ="ir('index.html')">Volver</button>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
    </header>
    <main class= "contenedor">
        <section class="card">
            <form id="form-producto">
            <h2>Agregar Productos</h2>
                <input type="text" id="nombre" placeholder="Nombre del producto" required>
                <input type="number" id="precio" placeholder="Precio" required>
                <input type="number" id="stock" placeholder="Stock inicial" required>
                <input type="text" id="ubicacion" placeholder="Ubicación" required>
                <select id="categoria" required>
                <option value="">Seleccionar categoría</option>
                <option value="1">Hogar y Muebles</option>
                <option value="2">Iluminación</option>
                <option value="3">Electro Hogar</option>
                <option value="4">Outdoor</option>
                <option value="5">Jardín y Mascotas</option>
                <option value="6">Ferretería</option>
                </select>
                <button type="submit">Guardar Producto</button>
</form>
        </section>
                <section class="card">
                    <h2>Listado de Productos</h2>
                    <section id="lista-productos"></section>
                </section>
            
    </main>

    <script src="app.js"></script>
    <script src="productos.js"></script>
</body>
</html>
