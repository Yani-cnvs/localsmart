<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="header-app">
        <section class="header-top">
        <button class="btn-header" onclick ="ir('dashboard.html')">Volver ⬅</button>
        <h2 class="titulo-header">Productos</h2> 
        <button class="btn-header salir" onclick="cerrarSesion()">Cerrar sesión ⏻</button>
        </section>
    </header>
    <main class= "contenedor">
        <section class="card">
            <!--En este formulario se ingresan los nuevos productos al sistema-->
            <form id="form-producto">
            <h2>Agregar Productos</h2>
                <input type="text" id="nombre" placeholder="Nombre del producto" required>
                <input type="number" id="precio" placeholder="Precio" required>
                <input type="number" id="stock" placeholder="Stock inicial" required>
                <input type="text" id="ubicacion" placeholder="Ubicación" required>
                <select id="categoria" required>
                <option value="">Seleccionar categoría</option>
                <option value="1">Hogar y Muebles</option>
                <option value="2">Iluminación</option>
                <option value="3">Electro Hogar</option>
                <option value="4">Outdoor</option>
                <option value="5">Jardín y Mascotas</option>
                <option value="6">Ferretería</option>
                </select>
                <button type="submit">Guardar Producto</button>
</form>
        </section>
                <section class="card">
                    <section class="buscador-contenedor">
                        <input type="text" id="buscador-producto" placeholder="Escribe el nombre de un producto...">
                        <button id="btn-buscar-producto">Buscar</button>
                    </section>
                    <h2>Listado de Productos</h2>
                    <section id="lista-productos"></section>
                </section>
            
    </main>
<nav class="menu">
    <button onclick="ir('dashboard.html')"><hspan class="menu-icono">🏠</span><span class="menu-texto">Dashboard</span></button>
    <button onclick="ir('productos.html')"><hspan class="menu-icono">📦</span><span class="menu-texto">Productos</span></button>
    <button onclick="ir('tareas.html')"><hspan class="menu-icono">📝</span><span class="menu-texto">Tareas</span></button>
    <button onclick="ir('incentivos.html')"><hspan class="menu-icono">🎁</span><span class="menu-texto">Incentivos</span></button>
    <!--estoos botones del menú son solo accesibles para los jefes-->
    <button id="btn-usuarios" onclick="ir('usuarios.html')"><span class="menu-icono">👤</span><span class="menu-texto">Usuarios</span></button>
    <button id="btn-reportes" onclick="ir('reportes.html')"><span class="menu-icono">📊</span><span class="menu-texto">Reportes</span></button>
</nav>
<script src="app.js"></script>
    <script src="productos.js"></script>
</body>
</html>
